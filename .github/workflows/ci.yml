name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      
      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./...